server {
    listen 80;
    server_name your-domain.com;

    client_max_body_size 25M;

    # If serving static/media locally (not S3), uncomment these:
    # location /static/ {
    #     alias /home/ubuntu/siyasi_news/SIYASI_NEWS/staticfiles/;
    # }
    # location /media/ {
    #     alias /home/ubuntu/siyasi_news/SIYASI_NEWS/media/;
    # }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/run/siyasi_news.sock;
    }
}
