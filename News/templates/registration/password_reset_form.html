{% extends "news/base.html" %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <p class="auth-eyebrow">Reset password</p>
      <h2>Forgot your password?</h2>
      <p class="auth-sub">Enter your email and we will send a reset link.</p>
    </div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_email" class="form-label">Email</label>
        <input type="email" name="email" class="form-control" id="id_email" required value="{{ form.email.value|default_if_none:'' }}">
        {% if form.email.errors %}
          <div class="text-danger small">{{ form.email.errors|striptags }}</div>
        {% endif %}
      </div>
      <button type="submit" class="btn auth-btn">Send reset link</button>
    </form>

    <p class="auth-footer">
      Remembered your password? <a href="{% url 'login' %}">Back to login</a>
    </p>
  </div>
</section>
{% endblock %}
