{% extends "news/base.html" %}
{% load socialaccount %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <p class="auth-eyebrow">Welcome back</p>
      <h2>Sign in</h2>
      <p class="auth-sub">Access your personalized news experience.</p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn auth-btn">Login</button>
    </form>

    <div class="auth-links">
      <a href="{% url 'password_reset' %}">Forgot password?</a>
    </div>

{% comment %}
    <div class="auth-divider"><span>or</span></div>
    <a href="{% provider_login_url 'google' %}" class="btn auth-google">
      <i class="fa-brands fa-google"></i> Continue with Google
    </a>
{% endcomment %}

    <p class="auth-footer">
      Do not have an account? <a href="{% url 'signup' %}">Sign up</a>
    </p>
  </div>
</section>
{% endblock %}
