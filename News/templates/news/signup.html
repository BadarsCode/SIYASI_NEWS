{% extends "news/base.html" %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <p class="auth-eyebrow">Create your account</p>
      <h2>Join Siyasi News</h2>
      <p class="auth-sub">Save your favorite topics and get a tailored feed.</p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="mb-3">
        <label for="password1" class="form-label">Password</label>
        <input type="password" class="form-control" id="password1" name="password1" autocomplete="new-password" required>
      </div>
      <div class="mb-3">
        <label for="password2" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="password2" name="password2" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn auth-btn">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Log in</a>
    </p>
  </div>
</section>
{% endblock %}
